<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenvolvimento de Interfaces Web | Login de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</head>

<body>
    <main>
        <section class="login-container">
            <h3>Entre no Soshi</h3>
            <form id="login-form" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Email</label>
                    <input type="text" name="username" id="emailLogin" class="form-control" />
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" name="password" id="passwordLogin" class="form-control" />
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn-custom">Login</button>
                    <button type="button" class="btn btn-link text-decoration-none" data-bs-toggle="modal"
                        data-bs-target="#loginModal">Cadastrar novo usuário</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Modal de Cadastro -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="loginModalLabel">Cadastrar novo usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="register-form">
                        <div class="mb-2">
                            <label for="nameRegister" class="form-label">Nome completo</label>
                            <input type="text" class="form-control" id="nameRegister" />
                        </div>
                        <div class="mb-2">
                            <label for="emailRegister" class="form-label">Email</label>
                            <input type="email" class="form-control" id="emailRegister" />
                        </div>
                        <div class="mb-2">
                            <label for="passwordRegister" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="passwordRegister" />
                        </div>
                        <div class="mb-3">
                            <label for="confirmPasswordRegister" class="form-label">Confirmar senha</label>
                            <input type="password" class="form-control" id="confirmPasswordRegister" />
                        </div>
                        <div class="modal-footer border-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" id="btn_salvar" class="btn-custom">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js" defer></script>
    <script type="module" src="./script.js"></script>
</body>

</html>
